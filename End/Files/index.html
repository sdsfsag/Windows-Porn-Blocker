<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everything comes to an end</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      color: #eeeeee;
      font-family: Georgia, "Times New Roman", serif;
      background: #030306;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(85, 95, 130, 0.24), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(70, 45, 75, 0.25), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(120, 120, 150, 0.13), transparent 35%),
        linear-gradient(180deg, #080812 0%, #11111f 45%, #030306 100%);
      z-index: 1;
    }

    .rain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(to bottom, rgba(255,255,255,0.13) 0%, rgba(255,255,255,0) 75%);
      background-size: 2px 120px;
      animation: rainMove 1.1s linear infinite;
      opacity: 0.18;
    }

    .fog {
      position: fixed;
      inset: -20%;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 70% 45%, rgba(255,255,255,0.06), transparent 40%);
      filter: blur(40px);
      animation: fogMove 18s ease-in-out infinite alternate;
      opacity: 0.55;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.75) 100%);
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .content {
      max-width: 1000px;
      animation: fadeIn 2.8s ease forwards;
      opacity: 0;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 7.5rem);
      font-weight: 400;
      letter-spacing: 0.045em;
      color: #f2f2f2;
      text-shadow:
        0 0 25px rgba(255,255,255,0.13),
        0 0 70px rgba(120,120,160,0.18);
      margin-bottom: 30px;
    }

    .line {
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #777, transparent);
      margin: 0 auto 30px;
      opacity: 0.7;
    }

    .date {
      font-family: Arial, sans-serif;
      font-size: clamp(1rem, 2vw, 1.45rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #a6a6a6;
      margin-bottom: 20px;
    }

    .small-text {
      font-family: Arial, sans-serif;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      letter-spacing: 0.1em;
      color: #6f6f6f;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background:
        radial-gradient(circle at center, rgba(90, 90, 120, 0.18), transparent 35%),
        rgba(0, 0, 0, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-box {
      padding: 40px;
      max-width: 600px;
      animation: fadeIn 2s ease forwards;
    }

    .start-title {
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-weight: 400;
      color: #f0f0f0;
      margin-bottom: 25px;
      letter-spacing: 0.04em;
    }

    .start-text {
      font-family: Arial, sans-serif;
      color: #9a9a9a;
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    audio {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes rainMove {
      from {
        background-position: 0 -120px;
      }

      to {
        background-position: 0 120px;
      }
    }

    @keyframes fogMove {
      from {
        transform: translateX(-4%) translateY(2%);
      }

      to {
        transform: translateX(4%) translateY(-2%);
      }
    }
  </style>
</head>

<body>
  <audio id="bgMusic" src="ridgeclub - do i clench my fists.mp3" loop preload="auto"></audio>

  <div class="background"></div>
  <div class="rain"></div>
  <div class="fog"></div>
  <div class="vignette"></div>

  <div class="start-screen" id="startScreen">
    <div class="start-box">
      <div class="start-title">Enter</div>
      <div class="start-text">click to continue</div>
    </div>
  </div>

  <main class="container">
    <div class="content">
      <h1>Everything comes to an end</h1>

      <div class="line"></div>

      <!-- HIER DEIN DATUM EINTRAGEN -->
      <div class="date">DATE WILL BE ADDED</div>

      <div class="small-text">Some endings are quiet.</div>
    </div>
  </main>

  <script>
    const startScreen = document.getElementById("startScreen");
    const audio = document.getElementById("bgMusic");

    startScreen.addEventListener("click", async () => {
      try {
        audio.volume = 0.5;
        await audio.play();
        startScreen.classList.add("hidden");
      } catch (error) {
        console.log("Audio konnte nicht gestartet werden:", error);
      }
    });
  </script>
</body>
</html>
