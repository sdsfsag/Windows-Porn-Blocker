<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everything comes to an end</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #020205;
      color: #eeeeee;
      font-family: Georgia, "Times New Roman", serif;
    }

    audio {
      display: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(120, 130, 170, 0.18), transparent 24%),
        radial-gradient(circle at 15% 20%, rgba(70, 90, 140, 0.28), transparent 28%),
        radial-gradient(circle at 85% 70%, rgba(120, 70, 110, 0.22), transparent 28%),
        linear-gradient(180deg, #090914 0%, #090910 42%, #030305 100%);
      animation: sceneDrift 16s ease-in-out infinite alternate;
      z-index: 1;
    }

    .moon {
      position: fixed;
      top: 8%;
      left: 50%;
      width: 180px;
      height: 180px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #f1f1f1, #aaaebd 45%, #464b63 74%, transparent 76%);
      opacity: 0.17;
      filter: blur(1px);
      box-shadow: 0 0 80px rgba(180, 190, 230, 0.28);
      animation: moonFloat 9s ease-in-out infinite alternate;
      z-index: 2;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.65) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,0.35) 0 1px, transparent 1.8px);
      background-size: 160px 160px, 240px 240px;
      background-position: 0 0, 80px 120px;
      opacity: 0.18;
      animation: particlesMove 40s linear infinite;
    }

    .horizon {
      position: fixed;
      left: -10%;
      bottom: 0;
      width: 120%;
      height: 34vh;
      background:
        linear-gradient(to top, #010102 0%, rgba(1, 1, 2, 0.95) 38%, transparent 100%);
      z-index: 4;
    }

    .mountains {
      position: fixed;
      left: -5%;
      bottom: 0;
      width: 110%;
      height: 38vh;
      z-index: 5;
      background:
        linear-gradient(135deg, transparent 0 45%, rgba(0,0,0,0.78) 45% 55%, transparent 55%) 0 100% / 420px 260px repeat-x,
        linear-gradient(225deg, transparent 0 44%, rgba(0,0,0,0.85) 44% 58%, transparent 58%) 80px 100% / 520px 300px repeat-x;
      opacity: 0.8;
      animation: mountainMove 28s linear infinite alternate;
    }

    .fog {
      position: fixed;
      inset: -30%;
      z-index: 6;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 45%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 55% 50%, rgba(255,255,255,0.06), transparent 34%),
        radial-gradient(circle at 82% 42%, rgba(255,255,255,0.07), transparent 30%);
      filter: blur(45px);
      opacity: 0.7;
      animation: fogMove 22s ease-in-out infinite alternate;
    }

    .fog.deep {
      z-index: 7;
      opacity: 0.38;
      filter: blur(70px);
      animation-duration: 34s;
      animation-direction: alternate-reverse;
    }

    .rain {
      position: fixed;
      inset: -20%;
      z-index: 8;
      pointer-events: none;
      background-image:
        linear-gradient(115deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.16) 18%, transparent 19%);
      background-size: 70px 170px;
      opacity: 0.16;
      animation: rainFall 0.75s linear infinite;
      transform: rotate(8deg);
    }

    .rain.second {
      opacity: 0.08;
      background-size: 110px 220px;
      animation-duration: 1.2s;
      filter: blur(1px);
    }

    .container {
      position: relative;
      z-index: 30;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .content {
      max-width: 1100px;
      animation: contentIn 3s ease forwards, contentFloat 7s ease-in-out infinite 3s;
      opacity: 0;
    }

    h1 {
      position: relative;
      font-size: clamp(3.4rem, 8.5vw, 8.6rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.05;
      color: #f3f3f3;
      text-shadow:
        0 0 20px rgba(255,255,255,0.18),
        0 0 55px rgba(130,140,190,0.22),
        0 0 95px rgba(80,80,120,0.28);
      animation: titlePulse 5s ease-in-out infinite;
    }

    h1::before,
    h1::after {
      content: "Everything comes to an end";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    h1::before {
      color: rgba(100, 180, 255, 0.55);
      transform: translateX(-3px);
      animation: glitchBlue 4.7s infinite;
    }

    h1::after {
      color: rgba(255, 90, 140, 0.5);
      transform: translateX(3px);
      animation: glitchRed 5.5s infinite;
    }

    .line {
      width: 250px;
      height: 1px;
      margin: 34px auto 30px;
      background: linear-gradient(90deg, transparent, rgba(220,220,220,0.8), transparent);
      box-shadow: 0 0 22px rgba(255,255,255,0.2);
      animation: lineBreath 4s ease-in-out infinite;
    }

    .date {
      font-family: Arial, sans-serif;
      font-size: clamp(1rem, 2vw, 1.55rem);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #b4b4b4;
      margin-bottom: 22px;
      text-shadow: 0 0 18px rgba(255,255,255,0.08);
    }

    .small-text {
      font-family: Arial, sans-serif;
      font-size: clamp(0.9rem, 1.45vw, 1.1rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #707070;
      animation: smallTextFade 5s ease-in-out infinite;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      background:
        radial-gradient(circle at center, rgba(130, 140, 180, 0.18), transparent 30%),
        rgba(0, 0, 0, 0.84);
      backdrop-filter: blur(10px);
      transition: opacity 1.3s ease, visibility 1.3s ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-box {
      padding: 42px;
      animation: startFloat 4s ease-in-out infinite;
    }

    .start-title {
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #eeeeee;
      margin-bottom: 24px;
      text-shadow:
        0 0 24px rgba(255,255,255,0.18),
        0 0 70px rgba(130,140,190,0.2);
    }

    .start-text {
      font-family: Arial, sans-serif;
      color: #9a9a9a;
      font-size: 0.95rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      animation: startBlink 2.2s ease-in-out infinite;
    }

    /* VHS OVERLAYS */
    .vhs {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      overflow: hidden;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.055) 0px,
          rgba(255,255,255,0.055) 1px,
          rgba(0,0,0,0.05) 2px,
          rgba(0,0,0,0.05) 4px
        );
      opacity: 0.28;
      mix-blend-mode: soft-light;
      animation: scanlineDrift 7s linear infinite;
    }

    .noise {
      position: absolute;
      inset: -20%;
      opacity: 0.16;
      mix-blend-mode: screen;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.05' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      animation: noiseMove 0.28s steps(2) infinite;
    }

    .tracking {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.14) 49%, transparent 51%, transparent 100%);
      opacity: 0.18;
      animation: trackingMove 9s linear infinite;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 22%, rgba(0,0,0,0.28) 55%, rgba(0,0,0,0.82) 100%);
    }

    .glitch-bar {
      position: absolute;
      left: -10%;
      width: 120%;
      height: 36px;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,0.04),
          rgba(255,255,255,0.14),
          rgba(255,255,255,0.04));
      opacity: 0;
      filter: blur(1px);
    }

    .glitch-bar.one {
      top: 18%;
      animation: glitchBar1 8s infinite;
    }

    .glitch-bar.two {
      top: 47%;
      animation: glitchBar2 11s infinite;
    }

    .glitch-bar.three {
      top: 73%;
      animation: glitchBar3 9s infinite;
    }

    /* global glitch bursts */
    body.glitch-now .scene,
    body.glitch-now .moon,
    body.glitch-now .particles,
    body.glitch-now .horizon,
    body.glitch-now .mountains,
    body.glitch-now .fog,
    body.glitch-now .rain,
    body.glitch-now .container {
      transform: translateX(4px) skewX(0.6deg);
      filter: saturate(0.9) contrast(1.08);
    }

    body.glitch-now .container {
      text-shadow:
        -2px 0 rgba(0, 180, 255, 0.35),
        2px 0 rgba(255, 0, 80, 0.28);
    }

    body.glitch-now .scanlines {
      opacity: 0.45;
    }

    body.glitch-now .noise {
      opacity: 0.28;
    }

    @keyframes sceneDrift {
      from {
        transform: scale(1.02) translateX(-1%);
        filter: brightness(0.95);
      }
      to {
        transform: scale(1.08) translateX(1%);
        filter: brightness(1.08);
      }
    }

    @keyframes moonFloat {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(18px); }
    }

    @keyframes mountainMove {
      from { transform: translateX(-1%); }
      to { transform: translateX(1%); }
    }

    @keyframes rainFall {
      from { background-position: 0 -220px; }
      to { background-position: 0 220px; }
    }

    @keyframes fogMove {
      from { transform: translateX(-8%) translateY(2%) scale(1); }
      to { transform: translateX(8%) translateY(-3%) scale(1.08); }
    }

    @keyframes particlesMove {
      from { background-position: 0 0, 80px 120px; }
      to { background-position: 420px 520px, -320px 660px; }
    }

    @keyframes noiseMove {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-1%, 1%); }
      50%  { transform: translate(-2%, -1%); }
      75%  { transform: translate(1%, -2%); }
      100% { transform: translate(0.5%, 1.5%); }
    }

    @keyframes scanlineDrift {
      from { transform: translateY(0); }
      to { transform: translateY(8px); }
    }

    @keyframes trackingMove {
      0%   { transform: translateY(-100%); opacity: 0; }
      8%   { opacity: 0.18; }
      15%  { opacity: 0.1; }
      20%  { transform: translateY(0%); opacity: 0; }
      100% { transform: translateY(140%); opacity: 0; }
    }

    @keyframes contentIn {
      from {
        opacity: 0;
        transform: translateY(34px) scale(0.97);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes contentFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes titlePulse {
      0%, 100% {
        opacity: 0.93;
        letter-spacing: 0.05em;
      }
      50% {
        opacity: 1;
        letter-spacing: 0.057em;
      }
    }

    @keyframes lineBreath {
      0%, 100% {
        width: 220px;
        opacity: 0.55;
      }
      50% {
        width: 320px;
        opacity: 1;
      }
    }

    @keyframes smallTextFade {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.9; }
    }

    @keyframes startFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes startBlink {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    @keyframes glitchBlue {
      0%, 84%, 100% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
      }
      85% {
        opacity: 0.75;
        clip-path: inset(12% 0 70% 0);
      }
      86% {
        opacity: 0.3;
        clip-path: inset(70% 0 8% 0);
      }
      87% {
        opacity: 0;
      }
    }

    @keyframes glitchRed {
      0%, 72%, 100% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
      }
      73% {
        opacity: 0.7;
        clip-path: inset(45% 0 35% 0);
      }
      74% {
        opacity: 0.32;
        clip-path: inset(8% 0 82% 0);
      }
      75% {
        opacity: 0;
      }
    }

    @keyframes glitchBar1 {
      0%, 91%, 100% { opacity: 0; transform: translateX(0); }
      92% { opacity: 0.6; transform: translateX(-18px); }
      93% { opacity: 0.2; transform: translateX(12px); }
      94% { opacity: 0; transform: translateX(0); }
    }

    @keyframes glitchBar2 {
      0%, 87%, 100% { opacity: 0; transform: translateX(0); }
      88% { opacity: 0.5; transform: translateX(24px); }
      89% { opacity: 0.18; transform: translateX(-14px); }
      90% { opacity: 0; transform: translateX(0); }
    }

    @keyframes glitchBar3 {
      0%, 93%, 100% { opacity: 0; transform: translateX(0); }
      94% { opacity: 0.55; transform: translateX(-22px); }
      95% { opacity: 0.22; transform: translateX(16px); }
      96% { opacity: 0; transform: translateX(0); }
    }

    @media (max-width: 650px) {
      .line {
        width: 170px;
      }

      @keyframes lineBreath {
        0%, 100% { width: 150px; }
        50% { width: 220px; }
      }
    }
  </style>
</head>
<body>
  <audio id="bgMusic" src="ridgeclub - do i clench my fists.mp3" loop preload="auto"></audio>

  <div class="scene"></div>
  <div class="moon"></div>
  <div class="particles"></div>
  <div class="horizon"></div>
  <div class="mountains"></div>
  <div class="fog"></div>
  <div class="fog deep"></div>
  <div class="rain"></div>
  <div class="rain second"></div>

  <div class="start-screen" id="startScreen">
    <div class="start-box">
      <div class="start-title">Enter</div>
      <div class="start-text">click to continue</div>
      <div class="start-text">(This popup has to be here im sorry otherwise your browser would block the music)</div>
    </div>
  </div>

  <main class="container">
    <div class="content">
      <h1>Everything comes to an end</h1>
      <div class="line"></div>

      <div class="date">6.8.2024 - 4.7.2026</div>

      <div class="small-text">It was a nice two years</div>
    </div>
  </main>

  <div class="vhs">
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="tracking"></div>
    <div class="glitch-bar one"></div>
    <div class="glitch-bar two"></div>
    <div class="glitch-bar three"></div>
    <div class="vignette"></div>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const audio = document.getElementById("bgMusic");

    startScreen.addEventListener("click", async () => {
      try {
        audio.volume = 0.5;
        await audio.play();
        startScreen.classList.add("hidden");
      } catch (error) {
        console.log("Audio konnte nicht gestartet werden:", error);
        alert("Der Browser blockiert die Musik. Bitte nochmal klicken.");
      }
    });

    function triggerRandomGlitch() {
      document.body.classList.add("glitch-now");
      const duration = 80 + Math.random() * 180;

      setTimeout(() => {
        document.body.classList.remove("glitch-now");
      }, duration);

      const next = 1400 + Math.random() * 4200;
      setTimeout(triggerRandomGlitch, next);
    }

    setTimeout(triggerRandomGlitch, 1800);
  </script>
</body>
</html>
