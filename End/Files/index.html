<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everything comes to an end</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      color: #eeeeee;
      font-family: Georgia, "Times New Roman", serif;
      background: #030306;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(85, 95, 130, 0.22), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(70, 45, 75, 0.23), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(120, 120, 150, 0.12), transparent 35%),
        linear-gradient(180deg, #080812 0%, #11111f 45%, #030306 100%);
      z-index: 1;
    }

    .rain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(to bottom, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 75%);
      background-size: 2px 120px;
      animation: rainMove 1.1s linear infinite;
      opacity: 0.18;
    }

    .fog {
      position: fixed;
      inset: -20%;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at 70% 45%, rgba(255,255,255,0.06), transparent 40%);
      filter: blur(40px);
      animation: fogMove 18s ease-in-out infinite alternate;
      opacity: 0.55;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.72) 100%);
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0.16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.35'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .content {
      max-width: 1000px;
      animation: fadeIn 2.8s ease forwards;
      opacity: 0;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 7.5rem);
      font-weight: 400;
      letter-spacing: 0.045em;
      color: #f2f2f2;
      text-shadow:
        0 0 25px rgba(255,255,255,0.13),
        0 0 70px rgba(120,120,160,0.18);
      margin-bottom: 30px;
    }

    .line {
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #777, transparent);
      margin: 0 auto 30px;
      opacity: 0.7;
    }

    .date {
      font-family: Arial, sans-serif;
      font-size: clamp(1rem, 2vw, 1.45rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #a6a6a6;
      margin-bottom: 20px;
    }

    .small-text {
      font-family: Arial, sans-serif;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      letter-spacing: 0.1em;
      color: #6f6f6f;
    }

    audio {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes rainMove {
      from {
        background-position: 0 -120px;
      }

      to {
        background-position: 0 120px;
      }
    }

    @keyframes fogMove {
      from {
        transform: translateX(-4%) translateY(2%);
      }

      to {
        transform: translateX(4%) translateY(-2%);
      }
    }
  </style>
</head>

<body>
  <audio id="bgMusic" src="ridgeclub - do i clench my fists.mp3" loop hidden></audio>

  <div class="background"></div>
  <div class="rain"></div>
  <div class="fog"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <main class="container">
    <div class="content">
      <h1>Everything comes to an end</h1>

      <div class="line"></div>

      <!-- HIER DEIN DATUM EINTRAGEN -->
      <div class="date">DATE WILL BE ADDED</div>

      <div class="small-text">Some endings are quiet.</div>
    </div>
  </main>

  <script>
    window.addEventListener("load", () => {
      const accepted = confirm("Play background music?");

      if (accepted) {
        const audio = document.getElementById("bgMusic");
        audio.volume = 0.5;

        audio.play().catch(() => {
          alert("Der Browser hat die Musik blockiert. Klicke danach einmal irgendwo auf die Seite.");
        });
      }
    });
  </script>
</body>
</html>
