<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everything comes to an end</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #020205;
      color: #eeeeee;
      font-family: Georgia, "Times New Roman", serif;
    }

    audio {
      display: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(120, 130, 170, 0.18), transparent 24%),
        radial-gradient(circle at 15% 20%, rgba(70, 90, 140, 0.28), transparent 28%),
        radial-gradient(circle at 85% 70%, rgba(120, 70, 110, 0.22), transparent 28%),
        linear-gradient(180deg, #090914 0%, #090910 42%, #030305 100%);
      animation: sceneDrift 16s ease-in-out infinite alternate;
    }

    .moon {
      position: fixed;
      top: 8%;
      left: 50%;
      width: 180px;
      height: 180px;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #f1f1f1, #aaaebd 45%, #464b63 74%, transparent 76%);
      opacity: 0.17;
      filter: blur(1px);
      box-shadow: 0 0 80px rgba(180, 190, 230, 0.28);
      animation: moonFloat 9s ease-in-out infinite alternate;
    }

    .horizon {
      position: fixed;
      left: -10%;
      bottom: 0;
      width: 120%;
      height: 34vh;
      background:
        linear-gradient(to top, #010102 0%, rgba(1, 1, 2, 0.95) 38%, transparent 100%);
      z-index: 3;
    }

    .mountains {
      position: fixed;
      left: -5%;
      bottom: 0;
      width: 110%;
      height: 38vh;
      z-index: 4;
      background:
        linear-gradient(135deg, transparent 0 45%, rgba(0,0,0,0.78) 45% 55%, transparent 55%) 0 100% / 420px 260px repeat-x,
        linear-gradient(225deg, transparent 0 44%, rgba(0,0,0,0.85) 44% 58%, transparent 58%) 80px 100% / 520px 300px repeat-x;
      opacity: 0.8;
      animation: mountainMove 28s linear infinite alternate;
    }

    .rain {
      position: fixed;
      inset: -20%;
      z-index: 8;
      pointer-events: none;
      background-image:
        linear-gradient(115deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.16) 18%, transparent 19%);
      background-size: 70px 170px;
      opacity: 0.16;
      animation: rainFall 0.75s linear infinite;
      transform: rotate(8deg);
    }

    .rain.second {
      opacity: 0.08;
      background-size: 110px 220px;
      animation-duration: 1.2s;
      filter: blur(1px);
    }

    .fog {
      position: fixed;
      inset: -30%;
      z-index: 6;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 45%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 55% 50%, rgba(255,255,255,0.06), transparent 34%),
        radial-gradient(circle at 82% 42%, rgba(255,255,255,0.07), transparent 30%);
      filter: blur(45px);
      opacity: 0.7;
      animation: fogMove 22s ease-in-out infinite alternate;
    }

    .fog.deep {
      z-index: 7;
      opacity: 0.38;
      filter: blur(70px);
      animation-duration: 34s;
      animation-direction: alternate-reverse;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.65) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,0.35) 0 1px, transparent 1.8px);
      background-size: 160px 160px, 240px 240px;
      background-position: 0 0, 80px 120px;
      opacity: 0.18;
      animation: particlesMove 40s linear infinite;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 25%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.86) 100%);
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 21;
      pointer-events: none;
      opacity: 0.13;
      mix-blend-mode: screen;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
      animation: noiseMove 0.45s steps(2) infinite;
    }

    .container {
      position: relative;
      z-index: 30;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .content {
      max-width: 1100px;
      animation: contentIn 3s ease forwards, contentFloat 7s ease-in-out infinite 3s;
      opacity: 0;
    }

    h1 {
      position: relative;
      font-size: clamp(3.4rem, 8.5vw, 8.6rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.05;
      color: #f3f3f3;
      text-shadow:
        0 0 20px rgba(255,255,255,0.18),
        0 0 55px rgba(130,140,190,0.22),
        0 0 95px rgba(80,80,120,0.28);
      animation: titlePulse 5s ease-in-out infinite;
    }

    h1::before,
    h1::after {
      content: "Everything comes to an end";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    h1::before {
      color: rgba(160, 190, 255, 0.5);
      transform: translateX(-2px);
      animation: glitchBlue 6s infinite;
    }

    h1::after {
      color: rgba(255, 120, 160, 0.45);
      transform: translateX(2px);
      animation: glitchRed 7s infinite;
    }

    .line {
      width: 250px;
      height: 1px;
      margin: 34px auto 30px;
      background: linear-gradient(90deg, transparent, rgba(220,220,220,0.8), transparent);
      box-shadow: 0 0 22px rgba(255,255,255,0.2);
      animation: lineBreath 4s ease-in-out infinite;
    }

    .date {
      font-family: Arial, sans-serif;
      font-size: clamp(1rem, 2vw, 1.55rem);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #b4b4b4;
      margin-bottom: 22px;
      text-shadow: 0 0 18px rgba(255,255,255,0.08);
    }

    .small-text {
      font-family: Arial, sans-serif;
      font-size: clamp(0.9rem, 1.45vw, 1.1rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #707070;
      animation: smallTextFade 5s ease-in-out infinite;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      background:
        radial-gradient(circle at center, rgba(130, 140, 180, 0.18), transparent 30%),
        rgba(0, 0, 0, 0.84);
      backdrop-filter: blur(10px);
      transition: opacity 1.3s ease, visibility 1.3s ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-box {
      padding: 42px;
      animation: startFloat 4s ease-in-out infinite;
    }

    .start-title {
      font-size: clamp(2.5rem, 6vw, 5.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #eeeeee;
      margin-bottom: 24px;
      text-shadow:
        0 0 24px rgba(255,255,255,0.18),
        0 0 70px rgba(130,140,190,0.2);
    }

    .start-text {
      font-family: Arial, sans-serif;
      color: #9a9a9a;
      font-size: 0.95rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      animation: startBlink 2.2s ease-in-out infinite;
    }

    @keyframes sceneDrift {
      from {
        transform: scale(1.02) translateX(-1%);
        filter: brightness(0.95);
      }

      to {
        transform: scale(1.08) translateX(1%);
        filter: brightness(1.08);
      }
    }

    @keyframes moonFloat {
      from {
        transform: translateX(-50%) translateY(0);
      }

      to {
        transform: translateX(-50%) translateY(18px);
      }
    }

    @keyframes mountainMove {
      from {
        transform: translateX(-1%);
      }

      to {
        transform: translateX(1%);
      }
    }

    @keyframes rainFall {
      from {
        background-position: 0 -220px;
      }

      to {
        background-position: 0 220px;
      }
    }

    @keyframes fogMove {
      from {
        transform: translateX(-8%) translateY(2%) scale(1);
      }

      to {
        transform: translateX(8%) translateY(-3%) scale(1.08);
      }
    }

    @keyframes particlesMove {
      from {
        background-position: 0 0, 80px 120px;
      }

      to {
        background-position: 420px 520px, -320px 660px;
      }
    }

    @keyframes noiseMove {
      0% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-2%, 1%);
      }

      100% {
        transform: translate(1%, -2%);
      }
    }

    @keyframes contentIn {
      from {
        opacity: 0;
        transform: translateY(34px) scale(0.97);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes contentFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes titlePulse {
      0%, 100% {
        opacity: 0.93;
        letter-spacing: 0.05em;
      }

      50% {
        opacity: 1;
        letter-spacing: 0.057em;
      }
    }

    @keyframes lineBreath {
      0%, 100% {
        width: 220px;
        opacity: 0.55;
      }

      50% {
        width: 320px;
        opacity: 1;
      }
    }

    @keyframes smallTextFade {
      0%, 100% {
        opacity: 0.45;
      }

      50% {
        opacity: 0.9;
      }
    }

    @keyframes startFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes startBlink {
      0%, 100% {
        opacity: 0.35;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes glitchBlue {
      0%, 88%, 100% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
      }

      89% {
        opacity: 0.8;
        clip-path: inset(15% 0 70% 0);
      }

      90% {
        opacity: 0.3;
        clip-path: inset(70% 0 10% 0);
      }

      91% {
        opacity: 0;
      }
    }

    @keyframes glitchRed {
      0%, 76%, 100% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
      }

      77% {
        opacity: 0.75;
        clip-path: inset(45% 0 35% 0);
      }

      78% {
        opacity: 0.35;
        clip-path: inset(10% 0 80% 0);
      }

      79% {
        opacity: 0;
      }
    }

    @media (max-width: 650px) {
      .line {
        width: 170px;
      }

      @keyframes lineBreath {
        0%, 100% {
          width: 150px;
        }

        50% {
          width: 220px;
        }
      }
    }
  </style>
</head>

<body>
  <audio id="bgMusic" src="ridgeclub - do i clench my fists.mp3" loop preload="auto"></audio>

  <div class="scene"></div>
  <div class="moon"></div>
  <div class="particles"></div>
  <div class="horizon"></div>
  <div class="mountains"></div>
  <div class="fog"></div>
  <div class="fog deep"></div>
  <div class="rain"></div>
  <div class="rain second"></div>
  <div class="vignette"></div>
  <div class="noise"></div>

  <div class="start-screen" id="startScreen">
    <div class="start-box">
      <div class="start-title">Enter</div>
      <div class="start-text">click to continue</div>
      <div class="start-text">(This popup has to be here im sorry otherwise your browser would block the music)</div>
    </div>
  </div>

  <main class="container">
    <div class="content">
      <h1>Everything comes to an end</h1>

      <div class="line"></div>

      <!-- HIER DEIN DATUM EINTRAGEN -->
      <div class="date">DATE WILL BE ADDED</div>

      <div class="small-text">Some endings are quiet.</div>
    </div>
  </main>

  <script>
    const startScreen = document.getElementById("startScreen");
    const audio = document.getElementById("bgMusic");

    startScreen.addEventListener("click", async () => {
      try {
        audio.volume = 0.5;
        await audio.play();
        startScreen.classList.add("hidden");
      } catch (error) {
        console.log("Audio konnte nicht gestartet werden:", error);
        alert("Der Browser blockiert die Musik. Bitte nochmal klicken.");
      }
    });
  </script>
</body>
</html>
